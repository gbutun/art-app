<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artists</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow" data-i18n="headerEyebrow">Private Collection</p>
          <h1 data-i18n="siteTitle">Modern Heritage Gallery</h1>
        </div>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="./index.html#gallery" data-i18n="navGallery">Gallery</a>
            <a href="./artists.html" data-i18n="navArtists">Artists</a>
            <a href="./index.html#about" data-i18n="navAbout">About</a>
          </nav>
          <div class="language-switcher" role="group" aria-label="Language selector">
            <button class="language-button is-active" type="button" data-language="en">
              English
            </button>
            <button class="language-button" type="button" data-language="tr">
              Türkçe
            </button>
          </div>
        </div>
      </header>

      <main>
        <section class="artists-section artists-directory">
          <div class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="artistsEyebrow">Artist Profiles</p>
              <h2 data-i18n="artistsTitle">Meet the artists</h2>
            </div>
            <p class="section-text" data-i18n="artistsText">
              Add a human story to the collection with biographies, artistic focus, and
              short notes that help visitors connect with each painter behind the work.
            </p>
          </div>

          <div class="artists-grid" id="artistsGrid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <template id="artistCardTemplate">
      <article class="artist-card">
        <a class="artist-card-link" href="#">
          <div class="artist-portrait" aria-hidden="true"></div>
          <div class="artist-copy">
            <p class="artist-role"></p>
            <h3></h3>
            <p class="artist-bio"></p>
            <ul class="artist-facts">
              <li class="artist-focus"></li>
              <li class="artist-origin"></li>
            </ul>
          </div>
        </a>
      </article>
    </template>

    <script src="./data.js"></script>
    <script src="./artists-page.js"></script>
  </body>
</html>
