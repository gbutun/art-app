<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News & Events</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow" data-i18n="headerEyebrow">Private Collection</p>
          <h1 data-i18n="siteTitle">Modern Heritage Gallery</h1>
        </div>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="./index.html#gallery" data-i18n="navGallery">Gallery</a>
            <a href="./news.html" data-i18n="navNews">News & Events</a>
            <a href="./artists.html" data-i18n="navArtists">Artists</a>
            <a href="./index.html#about" data-i18n="navAbout">About</a>
          </nav>
          <div class="language-switcher" role="group" aria-label="Language selector">
            <button class="language-button is-active" type="button" data-language="en">
              English
            </button>
            <button class="language-button" type="button" data-language="tr">
              Türkçe
            </button>
          </div>
        </div>
      </header>

      <main>
        <section class="news-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow" data-i18n="newsEyebrow">Studio Journal</p>
              <h2 data-i18n="newsTitle">News & events</h2>
            </div>
            <p class="section-text" data-i18n="newsText">
              Keep visitors up to date with current exhibitions, studio milestones, and upcoming gatherings around the collection.
            </p>
          </div>

          <div class="news-grid" id="newsGrid" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <template id="newsCardTemplate">
      <article class="news-card">
        <div class="news-card-meta">
          <p class="news-card-type"></p>
          <p class="news-card-date"></p>
        </div>
        <h3 class="news-card-title"></h3>
        <p class="news-card-body"></p>
      </article>
    </template>

    <script src="./gallery-data.js"></script>
    <script src="./news-page.js"></script>
  </body>
</html>
