<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArtRadar — Turkey Art Events</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .artRadar-frame {
        width: 100%;
        height: 80vh;
        border: none;
        border-radius: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow" data-i18n="headerEyebrow">Private Collection</p>
          <h1 data-i18n="siteTitle">Modern Heritage Gallery</h1>
        </div>
        <div class="header-actions">
          <nav class="site-nav" aria-label="Primary">
            <a href="./index.html#gallery" data-i18n="navGallery">Gallery</a>
            <a href="./news.html" data-i18n="navNews">News & Events</a>
            <a href="./artists.html" data-i18n="navArtists">Artists</a>
          </nav>
          <div class="language-switcher" role="group" aria-label="Language selector">
            <button class="language-button is-active" type="button" data-language="en">English</button>
            <button class="language-button" type="button" data-language="tr">Türkçe</button>
          </div>
        </div>
      </header>

      <main>
        <section class="artRadar-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Art Intelligence · Turkey</p>
              <h2>ArtRadar</h2>
            </div>
          </div>
          <iframe
            src="./SanatRadar.html?embed=1"
            class="artRadar-frame"
            title="ArtRadar — Turkey Art Events"
          ></iframe>
        </section>
      </main>
    </div>

    <script src="./gallery-data.js"></script>
    <script>
      const languageButtons = document.querySelectorAll("[data-language]");
      let currentLanguage = new URLSearchParams(location.search).get("lang") || "en";

      function applyLanguage(lang) {
        currentLanguage = lang;
        document.documentElement.lang = lang;
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          const key = el.dataset.i18n;
          if (translations[lang]?.[key]) el.textContent = translations[lang][key];
        });
        languageButtons.forEach((btn) => {
          btn.classList.toggle("is-active", btn.dataset.language === lang);
          btn.setAttribute("aria-pressed", String(btn.dataset.language === lang));
        });
      }

      languageButtons.forEach((btn) =>
        btn.addEventListener("click", () => applyLanguage(btn.dataset.language))
      );

      applyLanguage(currentLanguage);
    </script>
  </body>
</html>
