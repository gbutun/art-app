name: Deploy Nonprod Static Web App

on:
  push:
    branches:
      - master
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - "artifacts/**"
      - "scripts/generate-gallery-data.mjs"
      - ".github/workflows/deploy-nonprod-static-web-app.yml"
  workflow_dispatch:

concurrency:
  group: nonprod-static-web-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Static Site
        run: |
          rm -rf dist
          node scripts/generate-gallery-data.mjs
          mkdir -p dist
          cp index.html artist.html artists.html news.html styles.css script.js artist-page.js artists-page.js news-page.js gallery-data.js dist/
          cp -R artifacts dist/artifacts
          du -sb dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NONPROD }}
          action: upload
          app_location: /
          app_artifact_location: dist
          api_location: ""
          output_location: ""
          skip_app_build: true
