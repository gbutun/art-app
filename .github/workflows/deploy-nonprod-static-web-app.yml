name: Deploy Nonprod Static Web App

on:
  push:
    branches:
      - master
    paths:
      - "*.html"
      - "*.css"
      - "*.js"
      - ".github/workflows/deploy-nonprod-static-web-app.yml"
  workflow_dispatch:

concurrency:
  group: nonprod-static-web-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NONPROD }}
          action: upload
          app_location: /
          api_location: ""
          output_location: ""
          skip_app_build: true
